# Render Blueprint (SwissYGO #84). Deploy: Render → New → Blueprint → point at this repo.
# Render provisions the service from here. Non-secret config is filled in; the two
# Supabase secrets are left as `sync: false` for you to enter in the dashboard (they are
# NOT stored in this public repo). REQUEST_TOKEN is auto-generated by Render.
services:
  - type: web
    name: swissygo-decks
    runtime: docker
    plan: free
    region: ohio
    branch: master
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        value: https://raw.githubusercontent.com/mycard/ygopro-database/master/locales/en-US/cards.cdb
      - key: CARD_IMAGE_URL
        value: https://images.ygoprodeck.com/images/cards
      - key: CARD_IMAGE_URL_EXT
        value: jpg
      - key: CARD_ART_URL              # cropped artwork (no borders) for the deck cover
        value: https://images.ygoprodeck.com/images/cards_cropped
      - key: REQUEST_TOKEN
        sync: false                # ← paste the pre-generated token in the dashboard (shared with the Pi / #102; NOT stored in this public repo)
      - key: REQUEST_TOKEN_IN_UI
        value: "false"
      - key: SUPABASE_URL
        sync: false                # ← you set this in the dashboard (https://<ref>.supabase.co)
      - key: SUPABASE_SERVICE_KEY
        sync: false                # ← you set this in the dashboard (sb_secret_… — secret)
      - key: SUPABASE_BUCKET
        value: deck-images
